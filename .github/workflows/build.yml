name: Build Stratos EXE with Drivers

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download SDR Drivers (DLLs)
      shell: powershell
      run: |
        # Создаем папку для драйверов
        New-Item -ItemType Directory -Path "drivers"
        
        # Скачиваем архив с драйверами (PothosSDR - универсальный набор)
        $url = "https://github.com/pothosware/PothosSDR/releases/download/2021.07.25/PothosSDR-2021.07.25-vc16-x64.exe"
        Invoke-WebRequest -Uri $url -OutFile "pothos_setup.exe"
        
        # Распаковываем только нужные DLL с помощью 7-Zip (он есть на виртуалке GitHub)
        & "C:\Program Files\7-Zip\7z.exe" e pothos_setup.exe -odrivers *.dll -r
        
        # Очистка лишнего
        Remove-Item "pothos_setup.exe"

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed `
        --add-data "drivers;drivers" `
        --name "Stratos_Analyzer_v7" main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Stratos_Executable
        path: dist/Stratos_Analyzer_v7.exe
