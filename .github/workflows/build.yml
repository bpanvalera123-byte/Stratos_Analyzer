name: Build Stratos PRO from ZIP

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy opencv-python PyQt5 pyqtgraph scipy pyinstaller

    - name: Extract Drivers ZIP
      shell: powershell
      run: |
        # Создаем папку drivers
        New-Item -ItemType Directory -Path "drivers" -Force
        
        # Распаковываем ваш архив drivers.zip в созданную папку
        if (Test-Path "drivers.zip") {
            Expand-Archive -Path "drivers.zip" -DestinationPath "drivers" -Force
            Write-Host "✅ Драйверы успешно извлечены из ZIP."
        } else {
            throw "❌ Ошибка: Файл drivers.zip не найден в репозитории!"
        }

    - name: Build with PyInstaller
      shell: powershell
      run: |
        # Собираем EXE, используя файлы из распакованной папки
        pyinstaller --noconfirm --onefile --windowed `
        --add-data "drivers;drivers" `
        --name "Stratos_Analyzer_v7" main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Stratos_Executable
        path: dist/Stratos_Analyzer_v7.exe
