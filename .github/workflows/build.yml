name: Build Stratos PRO Fixed

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy opencv-python PyQt5 pyqtgraph scipy pyinstaller

    - name: Inject Critical Drivers
      shell: powershell
      run: |
        New-Item -ItemType Directory -Path "drivers" -Force
        Write-Host "🚀 Downloading drivers..."
        
        # Каждая загрузка отдельной строкой без лишних переменных
        curl.exe -L -o "drivers/hackrf.dll" "https://github.com/pothosware/PothosSDR/raw/master/wrapper/hackrf.dll"
        curl.exe -L -o "drivers/SoapySDR.dll" "https://github.com/pothosware/PothosSDR/raw/master/wrapper/SoapySDR.dll"
        curl.exe -L -o "drivers/libusb-1.0.dll" "https://github.com/pothosware/PothosSDR/raw/master/wrapper/libusb-1.0.dll"
        curl.exe -L -o "drivers/pthreadVC2.dll" "https://github.com/pothosware/PothosSDR/raw/master/wrapper/pthreadVC2.dll"
        
        Write-Host "✅ Done."
        Get-ChildItem "drivers"

    - name: Build with PyInstaller
      shell: powershell
      run: |
        # Здесь мы убрали все сложные переносы, чтобы PowerShell не путался
        pyinstaller --noconfirm --onefile --windowed --add-data "drivers;drivers" --name "Stratos_Analyzer_v7" main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Stratos_Executable
        path: dist/Stratos_Analyzer_v7.exe
