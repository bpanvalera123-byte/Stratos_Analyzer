name: Build Stratos PRO (Auto-Inject DLLs)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy opencv-python PyQt5 pyqtgraph scipy pyinstaller

    - name: Inject Critical Drivers
      shell: powershell
      run: |
        # 1. Создаем целевую папку
        New-Item -ItemType Directory -Path "drivers" -Force
        
        # 2. Список прямых ссылок на критические DLL (x64)
        # Эти файлы весят суммарно около 5-7 МБ, скачиваются мгновенно.
        $dlls = @(
            "https://github.com/pothosware/PothosSDR/raw/master/wrapper/hackrf.dll",
            "https://github.com/pothosware/PothosSDR/raw/master/wrapper/SoapySDR.dll",
            "https://github.com/pothosware/PothosSDR/raw/master/wrapper/libusb-1.0.dll",
            "https://github.com/pothosware/PothosSDR/raw/master/wrapper/pthreadVC2.dll"
        )
        
        Write-Host "🚀 Начинаю точечную инъекцию драйверов..."
        
        foreach ($url in $dlls) {
            $filename = Split-Path $url -Leaf
            Write-Host "📥 Загрузка $filename..."
            curl.exe -L -f -o "drivers/$filename" $url
            if ($LASTEXITCODE -ne 0) { throw "Ошибка загрузки $filename" }
        }
        
        Write-Host "✅ Все библиотеки успешно подтянуты."
        Get-ChildItem "drivers" | Select-Object Name

    - name: Build with PyInstaller
      shell: powershell
      run: |
        # Сборка EXE с автоматическим включением подтянутых драйверов
        pyinstaller --noconfirm --onefile --windowed `
        --add-data "drivers;drivers" `
        --name "Stratos_Analyzer_v7" main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Stratos_Executable
        path: dist/Stratos_Analyzer_v7.exe
