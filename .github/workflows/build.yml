name: Build Stratos EXE with Drivers

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy opencv-python PyQt5 pyqtgraph scipy pyinstaller

    - name: Download SDR Drivers (DLLs)
      shell: powershell
      run: |
        # 1. Подготовка окружения
        New-Item -ItemType Directory -Path "drivers" -Force
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        
        $url = "https://github.com/pothosware/PothosSDR/releases/download/2021.07.25/PothosSDR-2021.07.25-vc16-x64.exe"
        
        Write-Host "Начинаю загрузку драйверов через curl..."
        
        # 2. Скачивание с использованием curl (более надежен для больших файлов)
        # -L (следовать редиректам), -f (ошибка при сбое), -S (показывать ошибки)
        curl.exe -L -f -S -o pothos_setup.exe $url
        
        if ($LASTEXITCODE -ne 0) {
            Write-Host "Curl не справился. Пробую запасной вариант Invoke-WebRequest..."
            Invoke-WebRequest -Uri $url -OutFile "pothos_setup.exe" -TimeoutSec 600
        }

        # 3. Проверка наличия файла и распаковка
        if (Test-Path "pothos_setup.exe") {
            Write-Host "Файл загружен. Начинаю извлечение DLL..."
            # Извлекаем все DLL из инсталлера в папку drivers
            & "C:\Program Files\7-Zip\7z.exe" e pothos_setup.exe -odrivers *.dll -r
            
            # Удаляем временный инсталлер, чтобы не раздувать архив
            Remove-Item "pothos_setup.exe"
            Write-Host "Распаковка завершена. Содержимое папки drivers:"
            Get-ChildItem "drivers" | Select-Object Name
        } else {
            throw "Критическая ошибка: Файл драйверов не был загружен."
        }

    - name: Build with PyInstaller
      shell: powershell
      run: |
        # Сборка EXE с интеграцией папки drivers
        # Используем ` для переноса строки в PowerShell
        pyinstaller --noconfirm --onefile --windowed `
        --add-data "drivers;drivers" `
        --name "Stratos_Analyzer_v7" main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Stratos_Executable
        path: dist/Stratos_Analyzer_v7.exe
        if-no-files-found: error
