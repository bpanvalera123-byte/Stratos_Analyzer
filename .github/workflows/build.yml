name: Build Stratos EXE v7.0

on: 
  push:
    branches: [ "main" ] # Сборка запускается при пуше в ветку main
  workflow_dispatch: # Позволяет запустить сборку вручную кнопкой

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # ОБНОВЛЕНО до v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5 # ОБНОВЛЕНО до v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Run PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed --add-data "drivers;drivers" main.py

    - name: Upload Finished EXE
      uses: actions/upload-artifact@v4 # ИСПРАВЛЕНО: Теперь используется v4
      with:
        name: Stratos_Analyzer_Portable
        path: dist/main.exe
        retention-days: 5 # Файл будет храниться 5 дней
